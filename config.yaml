tts:
  api_url: "http://localhost:8020"
  default_settings:
    temperature: 0.75   # Баланс между стабильностью и вариативностью 0,8 было
    speed: 0.9   # Чуть медленнее = естественнее 0,9 было
    length_penalty: 1.0
    repetition_penalty: 1.3   # Даём модели немного повторять (как в живой речи) 1,3 было
    top_p: 0.8   # Чуть выше = больше интонационного разнообразия 0,8 было
    top_k: 50
    enable_text_splitting: true

audio:
  sample_rate: 24000
  max_segment_length: 250